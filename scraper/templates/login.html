<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white d-flex justify-content-center align-items-center" style="height: 100vh;">
    <div class="card p-4 bg-dark text-white" style="width: 300px;">
        <h3 class="text-center mb-3">🔐 Login</h3>

        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <input type="text" class="form-control mb-2" name="username" placeholder="Username" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>

            <button class="btn btn-success w-100">Login</button>
        </form>

        <div class="text-center mt-3">
            <a href="/api/signup/" class="text-info">Create an account</a>
        </div>

    </div>
    
</body>
</html>
