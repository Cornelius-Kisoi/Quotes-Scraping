<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white d-flex justify-content-center align-items-center" style="height: 100vh;">
    <div class="card p-4 bg-dark text-white" style="width: 320px;">
        <h3 class="text-center mb-3">📝 Sign Up</h3>

        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <input type="text" name="username" class="form-control mb-2" placeholder="Username" required>
            <input type="password" name="password" class="form-control mb-2" placeholder="Password" required>
            <input type="password" name="confirm_password" class="form-control mb-3" placeholder="Confirm Password" required>

            <button class="btn btn-success w-100">Create Account</button>
        </form>

        <div class="text-center mt-3">
            <a href="/api/login/" class="text-info">Already have an account? Login</a>
        </div>
    </div>
</body>
</html>
